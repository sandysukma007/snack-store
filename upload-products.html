        snackProducts.forEach((product, index) => {
            productsHTML += `
                <div class="product-item">
                    <span class="product-name">${index + 1}. ${product.name}</span>
                    <span class="product-price">Rp ${product.price.toLocaleString('id-ID')}</span>
                </div>
            `;
        });
        productsList.innerHTML = productsHTML;

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function startUpload() {
            const uploadBtn = document.getElementById('uploadBtn');
            const status = document.getElementById('status');
            const progress = document.getElementById('progress');
            const progressBar = document.getElementById('progressBar');

            uploadBtn.disabled = true;
            uploadBtn.textContent = '⏳ Mengupload...';

            status.className = 'status loading';
            status.textContent = 'Memulai upload...';

            progress.style.display = 'block';
            progressBar.style.width = '0%';

            try {
                const batch = db.batch();
                const productsRef = db.collection('products');

                for (let i = 0; i < snackProducts.length; i++) {
                    const product = snackProducts[i];
                    const productId = product.name.toLowerCase().replace(/\s+/g, '-');
                    const docRef = productsRef.doc(productId);
                    batch.set(docRef, product);

                    // Update progress
                    const percent = ((i + 1) / snackProducts.length) * 100;
                    progressBar.style.width = percent + '%';

                    // Small delay to show progress
                    await new Promise(resolve => setTimeout(resolve, 50));
                }

                await batch.commit();

                status.className = 'status success';
                status.textContent = '✅ Berhasil mengupload ' + snackProducts.length + ' produk ke Firestore!';
                uploadBtn.textContent = '✅ Upload Selesai';

                console.log('Successfully uploaded all products!');

            } catch (error) {
                console.error('Error uploading products:', error);
                status.className = 'status error';
                status.textContent = '❌ Error: ' + error.message;
                uploadBtn.disabled = false;
                uploadBtn.textContent = '🚀 Upload Semua Produk';
            }
